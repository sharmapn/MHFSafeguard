<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680"><style>.bg{fill:#f7fafc}.top{fill:#2c6f9f}.panel{fill:#fff;stroke:#d0d7de}.toolbar{fill:#eef3f7;stroke:#d0d7de}.txt{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:24px;font-weight:700}.small{font-size:15px}.btn{fill:#2f6fed}.btn2{fill:#eef3f7;stroke:#b6c2cf}.btntext{fill:white;font-size:15px;font-weight:700}.muted{fill:#6b7280}</style><rect class="bg" width="1100" height="680"/><rect class="top" width="1100" height="70"/><text x="55" y="43" class="txt" fill="#fff" font-size="28" font-weight="700">Mental Health Forum</text><text x="830" y="43" class="txt" fill="#fff" font-size="16">Forums  Articles  Members  Search</text><rect class="panel" x="95" y="105" width="910" height="500" rx="8"/><text x="130" y="150" class="txt title">Post a reply</text><text x="130" y="182" class="txt small muted">The user writes normally. No API call is made while typing in this first version.</text><rect class="toolbar" x="130" y="215" width="840" height="42" rx="4"/><text x="150" y="242" class="txt small">B  I  Link  Quote  Preview</text><rect class="panel" x="130" y="257" width="840" height="230" rx="4"/><text x="155" y="292" class="txt small">I wanted to share how I have been feeling today...</text><text x="155" y="324" class="txt small">This message is checked only after the user clicks Submit.</text><text x="155" y="356" class="txt small">The plugin sends one cleaned full message to the local classifier API.</text><rect class="btn" x="130" y="520" width="120" height="42" rx="5"/><text x="190" y="547" text-anchor="middle" class="btntext">Submit</text><rect class="btn2" x="265" y="520" width="110" height="42" rx="5"/><text x="320" y="547" text-anchor="middle" class="txt small">Preview</text><text x="130" y="590" class="txt small muted">Submission-time checking keeps the interface familiar and avoids repeated API calls.</text></svg>