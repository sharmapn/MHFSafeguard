<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680"><style>.bg{fill:#f7fafc}.top{fill:#2c6f9f}.panel{fill:#fff;stroke:#d0d7de}.notice{fill:#eff6ff;stroke:#60a5fa}.txt{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:24px;font-weight:700}.small{font-size:15px}.muted{fill:#6b7280}.btn{fill:#2f6fed}.btntext{fill:white;font-size:15px;font-weight:700}</style><rect class="bg" width="1100" height="680"/><rect class="top" width="1100" height="70"/><text x="55" y="43" class="txt" fill="#fff" font-size="28" font-weight="700">Mental Health Forum</text><rect class="panel" x="120" y="120" width="860" height="430" rx="8"/><rect class="notice" x="160" y="175" width="780" height="150" rx="8"/><text x="190" y="220" class="txt title">Your message is awaiting moderator review</text><text x="190" y="260" class="txt small">The post has been saved but is not publicly visible yet.</text><text x="190" y="290" class="txt small">A moderator will review it because the safety checker recommended moderation.</text><text x="160" y="365" class="txt small muted">This is the recommended first operational mode because it avoids blocking users while still prioritising high-risk content for staff review.</text><rect class="btn" x="160" y="420" width="170" height="42" rx="5"/><text x="245" y="447" text-anchor="middle" class="btntext">Return to forum</text></svg>