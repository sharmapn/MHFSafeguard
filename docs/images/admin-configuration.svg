<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680"><style>.bg{fill:#f5f7fb}.panel{fill:#fff;stroke:#d0d7de}.bar{fill:#25364a}.txt{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:24px;font-weight:700}.small{font-size:15px}.label{font-size:14px;font-weight:700}.input{fill:#fff;stroke:#b6c2cf}.btn{fill:#2f6fed}.btntext{fill:white;font-size:14px;font-weight:700}</style><rect class="bg" width="1100" height="680"/><rect class="bar" x="0" y="0" width="1100" height="58"/><text x="30" y="37" class="txt" fill="#fff" font-size="22" font-weight="700">XenForo Admin Control Panel</text><rect class="panel" x="70" y="95" width="960" height="520" rx="8"/><text x="100" y="135" class="txt title">Options: MHF Safeguard</text><text x="100" y="172" class="txt small">Configure the self-managed classifier API and moderation behaviour.</text><text x="100" y="220" class="txt label">Enable scanning</text><rect class="input" x="330" y="200" width="30" height="30" rx="4"/><path d="M337 215 L344 222 L355 207" stroke="#2f6fed" stroke-width="4" fill="none"/><text x="375" y="220" class="txt small">Scan new posts, replies, and edits before publication</text><text x="100" y="270" class="txt label">Classifier API URL</text><rect class="input" x="330" y="248" width="550" height="34" rx="4"/><text x="345" y="270" class="txt small">https://your-server.example/api/classify</text><text x="100" y="320" class="txt label">API key</text><rect class="input" x="330" y="298" width="550" height="34" rx="4"/><text x="345" y="320" class="txt small">••••••••••••••••••••••</text><text x="100" y="370" class="txt label">Action mode</text><rect class="input" x="330" y="348" width="220" height="34" rx="4"/><text x="345" y="370" class="txt small">Log / Moderate / Revise</text><text x="100" y="420" class="txt label">Thresholds</text><rect class="input" x="330" y="398" width="120" height="34" rx="4"/><text x="345" y="420" class="txt small">85</text><text x="470" y="420" class="txt small">Moderate</text><rect class="input" x="580" y="398" width="120" height="34" rx="4"/><text x="595" y="420" class="txt small">95</text><text x="720" y="420" class="txt small">Revise</text><text x="100" y="470" class="txt label">Excluded forums</text><rect class="input" x="330" y="448" width="550" height="78" rx="4"/><text x="345" y="475" class="txt small">Moderated posts, staff-only forums, archived areas</text><text x="100" y="565" class="txt label">Safe testing setup</text><text x="330" y="565" class="txt small">Start with Action mode = Log and Fail open = On</text><rect class="btn" x="850" y="555" width="120" height="38" rx="5"/><text x="910" y="579" text-anchor="middle" class="btntext">Save</text></svg>