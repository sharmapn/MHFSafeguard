<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680"><style>.bg{fill:#f7fafc}.top{fill:#2c6f9f}.panel{fill:#fff;stroke:#d0d7de}.warn{fill:#fff7ed;stroke:#fb923c}.txt{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:24px;font-weight:700}.small{font-size:15px}.btn{fill:#2f6fed}.btn2{fill:#eef3f7;stroke:#b6c2cf}.btntext{fill:white;font-size:15px;font-weight:700}.muted{fill:#6b7280}</style><rect class="bg" width="1100" height="680"/><rect class="top" width="1100" height="70"/><text x="55" y="43" class="txt" fill="#fff" font-size="28" font-weight="700">Mental Health Forum</text><rect class="panel" x="95" y="105" width="910" height="500" rx="8"/><text x="130" y="150" class="txt title">Please revise your message</text><rect class="warn" x="130" y="185" width="840" height="120" rx="8"/><text x="160" y="225" class="txt" font-size="19" font-weight="700">The safety checker found content that may require editing.</text><text x="160" y="258" class="txt small">Your message has not been posted. Please revise the highlighted section or remove specific harmful details.</text><text x="160" y="285" class="txt small muted">The aim is to keep the community safe while still allowing support-seeking discussion.</text><rect class="panel" x="130" y="330" width="840" height="135" rx="4"/><text x="155" y="365" class="txt small">Flagged by classifier:</text><text x="155" y="400" class="txt small" font-weight="700">Label: method_or_action</text><text x="155" y="430" class="txt small">Risk score: 95</text><rect class="btn" x="130" y="505" width="150" height="42" rx="5"/><text x="205" y="532" text-anchor="middle" class="btntext">Edit message</text><rect class="btn2" x="300" y="505" width="110" height="42" rx="5"/><text x="355" y="532" text-anchor="middle" class="txt small">Cancel</text><text x="130" y="590" class="txt small muted">This screen appears only when Action mode is set to Revise and the score exceeds the revision threshold.</text></svg>