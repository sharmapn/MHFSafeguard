<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680"><style>.bg{fill:#f5f7fb}.panel{fill:#fff;stroke:#d0d7de}.bar{fill:#25364a}.txt{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:24px;font-weight:700}.small{font-size:14px}.head{fill:#eaf3fa;stroke:#d0d7de}.row{fill:#fff;stroke:#e5e7eb}.riskh{fill:#fee2e2}.riskm{fill:#fef3c7}.riskl{fill:#dcfce7}.pilltxt{font-size:12px;font-weight:700}</style><rect class="bg" width="1100" height="680"/><rect class="bar" width="1100" height="58"/><text x="30" y="37" class="txt" fill="#fff" font-size="22" font-weight="700">XenForo Admin Control Panel</text><rect class="panel" x="60" y="90" width="980" height="530" rx="8"/><text x="90" y="132" class="txt title">MHF Safeguard: Classification Log</text><text x="90" y="165" class="txt small">Recent messages checked by the local classifier API.</text><rect class="head" x="90" y="200" width="920" height="42"/><text x="110" y="226" class="txt small" font-weight="700">Date</text><text x="245" y="226" class="txt small" font-weight="700">User</text><text x="390" y="226" class="txt small" font-weight="700">Content</text><text x="570" y="226" class="txt small" font-weight="700">Risk</text><text x="690" y="226" class="txt small" font-weight="700">Label / score</text><text x="880" y="226" class="txt small" font-weight="700">Action</text><rect class="row" x="90" y="242" width="920" height="56"/><text x="110" y="276" class="txt small">Today 10:22</text><text x="245" y="276" class="txt small">member21</text><text x="390" y="276" class="txt small">Reply #1842</text><rect class="riskh" x="565" y="256" width="70" height="24" rx="12"/><text x="600" y="273" text-anchor="middle" class="txt pilltxt">HIGH</text><text x="690" y="276" class="txt small">method_or_action / 94</text><text x="880" y="276" class="txt small">Moderated</text><rect class="row" x="90" y="298" width="920" height="56"/><text x="110" y="332" class="txt small">Today 10:18</text><text x="245" y="332" class="txt small">newuser8</text><text x="390" y="332" class="txt small">Thread draft</text><rect class="riskm" x="565" y="312" width="85" height="24" rx="12"/><text x="607" y="329" text-anchor="middle" class="txt pilltxt">MEDIUM</text><text x="690" y="332" class="txt small">ideation / 81</text><text x="880" y="332" class="txt small">Logged</text><rect class="row" x="90" y="354" width="920" height="56"/><text x="110" y="388" class="txt small">Today 10:11</text><text x="245" y="388" class="txt small">member04</text><text x="390" y="388" class="txt small">Reply #1839</text><rect class="riskl" x="565" y="368" width="70" height="24" rx="12"/><text x="600" y="385" text-anchor="middle" class="txt pilltxt">LOW</text><text x="690" y="388" class="txt small">not_harmful / 12</text><text x="880" y="388" class="txt small">Allowed</text><rect class="row" x="90" y="410" width="920" height="108"/><text x="110" y="442" class="txt small" font-weight="700">Selected record details</text><text x="110" y="472" class="txt small">Flagged span/sentence returned by API is stored for moderator review.</text><text x="110" y="500" class="txt small">Raw API response can be retained during testing and disabled later for privacy.</text><text x="90" y="570" class="txt small">Purpose: gives administrators a reviewable audit trail of classifier decisions.</text></svg>